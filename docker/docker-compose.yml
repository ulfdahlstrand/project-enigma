name: cv-tool

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cv-tool-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    image: ghcr.io/amacneil/dbmate:2
    command: ["--wait", "up"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ../packages/database/migrations:/db/migrations
    networks:
      - cv-tool-network
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BACKEND_PORT: ${BACKEND_PORT}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ../apps/backend:/app/apps/backend
      - /app/apps/backend/node_modules
    networks:
      - cv-tool-network
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:${BACKEND_PORT}/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT}
      VITE_API_URL: http://localhost:${BACKEND_PORT}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ../apps/frontend:/app/apps/frontend
      - /app/apps/frontend/node_modules
    networks:
      - cv-tool-network
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local

networks:
  cv-tool-network:
    driver: bridge
