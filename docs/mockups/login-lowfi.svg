  <style>.bg{fill:#f6f6f6}.panel{fill:#fff;stroke:#222;stroke-width:2}.soft{fill:#efefef;stroke:#222;stroke-width:2}.title{font:28px sans-serif;font-weight:700;fill:#111}.section{font:20px sans-serif;font-weight:700;fill:#111}.text{font:16px sans-serif;fill:#111}.small{font:13px sans-serif;fill:#333}.muted{font:13px sans-serif;fill:#666}</style>
