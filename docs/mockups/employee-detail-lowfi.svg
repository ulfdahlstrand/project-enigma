<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #f6f6f6; }
    .panel { fill: #fff; stroke: #222; stroke-width: 2; }
    .soft { fill: #f0f0f0; stroke: #222; stroke-width: 2; }
    .text { font: 16px sans-serif; fill: #111; }
    .small { font: 13px sans-serif; fill: #333; }
    .muted { font: 13px sans-serif; fill: #666; }
    .title { font: 28px sans-serif; font-weight: 700; fill: #111; }
    .section { font: 20px sans-serif; font-weight: 700; fill: #111; }
  </style>

  <rect class="bg" x="0" y="0" width="1600" height="1200" />

  <text class="title" x="70" y="70">Employee Detail Page Low-Fi Wireframe</text>
  <text class="text" x="70" y="100">Based on current route: employee details, resume actions, education lists, and add-education form.</text>

  <rect class="panel" x="60" y="140" width="1480" height="980" rx="16" />
  <rect class="soft" x="60" y="140" width="1480" height="56" rx="16" />
  <text class="text" x="84" y="175">App shell / page chrome</text>

  <!-- Main content frame -->
  <rect class="panel" x="110" y="240" width="1380" height="820" rx="12" />

  <!-- Header -->
  <text class="section" x="140" y="285">Page header</text>
  <rect class="soft" x="140" y="300" width="640" height="74" rx="8" />
  <text class="small" x="160" y="330">Page title</text>
  <text class="small" x="160" y="352">Employee detail</text>

  <rect class="soft" x="1080" y="304" width="170" height="42" rx="8" />
  <rect class="soft" x="1264" y="304" width="170" height="42" rx="8" />
  <text class="small" x="1124" y="330">Import CV</text>
  <text class="small" x="1300" y="330">View resumes</text>
  <text class="muted" x="1080" y="364">Secondary actions live beside the title.</text>

  <!-- Left column -->
  <rect class="panel" x="140" y="404" width="560" height="610" rx="10" />
  <text class="section" x="164" y="438">Employee details</text>

  <rect class="soft" x="164" y="462" width="512" height="86" rx="8" />
  <text class="small" x="184" y="492">Field: Name</text>
  <text class="muted" x="184" y="516">Primary editable identity information.</text>

  <rect class="soft" x="164" y="568" width="512" height="86" rx="8" />
  <text class="small" x="184" y="598">Field: Email</text>
  <text class="muted" x="184" y="622">Second core editable field.</text>

  <rect class="soft" x="514" y="674" width="162" height="42" rx="8" />
  <text class="small" x="573" y="700">Save</text>

  <rect class="soft" x="164" y="754" width="512" height="224" rx="8" />
  <text class="small" x="184" y="780">Potential UX improvement area</text>
  <text class="muted" x="184" y="806">Space for future supporting information:</text>
  <text class="muted" x="184" y="830">- linked resumes summary</text>
  <text class="muted" x="184" y="854">- import history / status</text>
  <text class="muted" x="184" y="878">- employee metadata</text>
  <text class="muted" x="184" y="902">- quick actions</text>
  <text class="muted" x="184" y="926">Current implementation leaves this area unused.</text>

  <!-- Right column -->
  <rect class="panel" x="730" y="404" width="730" height="610" rx="10" />
  <text class="section" x="754" y="438">Education and qualifications</text>

  <rect class="soft" x="754" y="462" width="682" height="118" rx="8" />
  <text class="small" x="774" y="490">Degrees list</text>
  <text class="muted" x="774" y="514">Repeated row pattern: entry value on left, delete action on right.</text>
  <rect class="panel" x="774" y="528" width="642" height="34" rx="6" />
  <text class="small" x="792" y="550">Degree entry row</text>
  <text class="small" x="1326" y="550">Delete</text>

  <rect class="soft" x="754" y="596" width="682" height="118" rx="8" />
  <text class="small" x="774" y="624">Certifications list</text>
  <rect class="panel" x="774" y="662" width="642" height="34" rx="6" />
  <text class="small" x="792" y="684">Certification entry row</text>
  <text class="small" x="1326" y="684">Delete</text>

  <rect class="soft" x="754" y="730" width="682" height="118" rx="8" />
  <text class="small" x="774" y="758">Languages list</text>
  <rect class="panel" x="774" y="796" width="642" height="34" rx="6" />
  <text class="small" x="792" y="818">Language entry row</text>
  <text class="small" x="1326" y="818">Delete</text>

  <rect class="soft" x="754" y="868" width="682" height="120" rx="8" />
  <text class="small" x="774" y="896">Add education form</text>
  <rect class="panel" x="774" y="922" width="150" height="40" rx="6" />
  <rect class="panel" x="940" y="922" width="340" height="40" rx="6" />
  <rect class="panel" x="1296" y="922" width="120" height="40" rx="6" />
  <text class="small" x="812" y="947">Type</text>
  <text class="small" x="1080" y="947">Value</text>
  <text class="small" x="1338" y="947">Add</text>

  <!-- Notes -->
  <rect class="panel" x="110" y="1080" width="1380" height="84" rx="10" />
  <text class="small" x="136" y="1110">UX notes for review</text>
  <text class="muted" x="136" y="1134">1. The page currently behaves like a narrow form with a long education section stacked below.</text>
  <text class="muted" x="136" y="1154">2. A clearer two-column structure makes the page easier to scan: identity/actions on the left, qualifications on the right.</text>
</svg>
