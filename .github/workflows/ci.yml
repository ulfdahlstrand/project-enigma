name: CI

on:
  pull_request:
    # Run on every PR that eventually reaches dev/main, including PRs that
    # target long-lived epic/** integration branches so feature branches get
    # typecheck + test coverage before landing in the epic (not only when the
    # epic finally opens a PR back to dev).
    branches: [main, dev, 'epic/**']

jobs:
  test:
    name: Type check & tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build contracts
        run: npm run build --workspace=packages/contracts

      - name: Build utils
        run: npm run build --workspace=packages/utils

      - name: Type check — contracts
        run: npx tsc --noEmit -p packages/contracts/tsconfig.json

      - name: Type check — backend
        run: npx tsc --noEmit -p apps/backend/tsconfig.json

      - name: Type check — frontend
        run: npx tsc --noEmit -p apps/frontend/tsconfig.json

      - name: Vitest — backend
        run: npx vitest run
        working-directory: apps/backend

      - name: Vitest — frontend
        run: npx vitest run
        working-directory: apps/frontend
